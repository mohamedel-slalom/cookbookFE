name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: CookbookFE/package-lock.json

      - name: Install dependencies
        working-directory: CookbookFE
        run: npm ci

      - name: Lint
        working-directory: CookbookFE
        run: npm run lint

      - name: Run unit tests
        working-directory: CookbookFE
        run: npm test

      - name: Build
        working-directory: CookbookFE
        run: npm run build
